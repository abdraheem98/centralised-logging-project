input {
  # Receive logs from all 10 microservices over TCP (JSON format)
  tcp {
    port => 5000
    codec => json_lines
  }

  # Also accept from Filebeat agents
  beats {
    port => 5044
  }
}

filter {
  # Parse timestamp from microservice log if present
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
    mutate {
      remove_field => ["timestamp"]
    }
  }

  # Add environment tag
  mutate {
    add_field => { "environment" => "development" }
  }

  # Set log level to uppercase
  if [level] {
    mutate {
      uppercase => ["level"]
    }
  }

  # Parse duration field as integer if present
  if [duration_ms] {
    mutate {
      convert => { "duration_ms" => "integer" }
    }
  }

  # Tag slow requests (over 1000ms)
  if [duration_ms] and [duration_ms] > 1000 {
    mutate {
      add_tag => ["slow_request"]
    }
  }

  # Tag errors
  if [level] == "ERROR" {
    mutate {
      add_tag => ["error"]
    }
  }

  # Geo-IP enrichment if client IP is present
  if [client_ip] and [client_ip] != "127.0.0.1" {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
}

output {
  # Send to Elasticsearch, one index per service
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-logs-%{service}-%{+YYYY.MM.dd}"
    manage_template => false
  }

  # Also write combined index for cross-service dashboard
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "microservices-all-%{+YYYY.MM.dd}"
    manage_template => false
  }

  # Debug: print to stdout (disable in production)
  stdout {
    codec => rubydebug
  }
}
