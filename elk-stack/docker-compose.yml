version: '3.8'

networks:
  logging-net:
    driver: bridge

volumes:
  elasticsearch-data:
  logstash-data:

services:

  # ─── Elasticsearch ───────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - logging-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ─── Logstash ────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    ports:
      - "5044:5044"   # Beats input
      - "5000:5000"   # TCP input
      - "9600:9600"   # API
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - logging-net

  # ─── Kibana ──────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - logging-net

  # ─── All 10 Microservices ─────────────────────────────────────────
  user-service:
    build: ../microservices/user-service
    container_name: user-service
    ports:
      - "3001:3001"
    environment:
      - SERVICE_NAME=user-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  order-service:
    build: ../microservices/order-service
    container_name: order-service
    ports:
      - "3002:3002"
    environment:
      - SERVICE_NAME=order-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  payment-service:
    build: ../microservices/payment-service
    container_name: payment-service
    ports:
      - "3003:3003"
    environment:
      - SERVICE_NAME=payment-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  inventory-service:
    build: ../microservices/inventory-service
    container_name: inventory-service
    ports:
      - "3004:3004"
    environment:
      - SERVICE_NAME=inventory-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  notification-service:
    build: ../microservices/notification-service
    container_name: notification-service
    ports:
      - "3005:3005"
    environment:
      - SERVICE_NAME=notification-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  product-service:
    build: ../microservices/product-service
    container_name: product-service
    ports:
      - "3006:3006"
    environment:
      - SERVICE_NAME=product-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  auth-service:
    build: ../microservices/auth-service
    container_name: auth-service
    ports:
      - "3007:3007"
    environment:
      - SERVICE_NAME=auth-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  cart-service:
    build: ../microservices/cart-service
    container_name: cart-service
    ports:
      - "3008:3008"
    environment:
      - SERVICE_NAME=cart-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  shipping-service:
    build: ../microservices/shipping-service
    container_name: shipping-service
    ports:
      - "3009:3009"
    environment:
      - SERVICE_NAME=shipping-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net

  analytics-service:
    build: ../microservices/analytics-service
    container_name: analytics-service
    ports:
      - "3010:3010"
    environment:
      - SERVICE_NAME=analytics-service
      - LOGSTASH_HOST=logstash
      - LOGSTASH_PORT=5000
    depends_on:
      - logstash
    networks:
      - logging-net
